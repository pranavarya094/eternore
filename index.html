<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternore — With Love For Aurora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;600&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#0d0810}

/* ── Lock Screen ── */
#lock-screen{
  position:fixed;inset:0;
  background:#0d0810;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;transition:opacity .8s ease;
}
#lock-screen.fade-out{opacity:0;pointer-events:none}
.lock-rose{font-size:52px;margin-bottom:2rem;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
.lock-title{font-family:'Dancing Script',cursive;font-size:30px;color:#c9a0a0;margin-bottom:.5rem;letter-spacing:.05em}
.lock-subtitle{font-family:'Cormorant Garamond',serif;font-size:13px;color:#7a6060;margin-bottom:2.5rem;letter-spacing:.2em;text-transform:uppercase}
#password-input{
  background:transparent;border:none;border-bottom:1px solid #4a3040;
  color:#f0ddd0;font-family:'Cormorant Garamond',serif;
  font-size:18px;padding:8px 16px;text-align:center;width:240px;
  letter-spacing:.3em;outline:none;transition:border-color .3s;display:block;
}
#password-input::placeholder{color:#4a3040;letter-spacing:.15em;font-size:14px}
#password-input:focus{border-color:#c9a0a0}
#unlock-btn{
  display:block;margin:1.75rem auto 0;
  background:transparent;border:1px solid #c9a0a0;color:#c9a0a0;
  font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.25em;text-transform:uppercase;
  padding:11px 36px;cursor:pointer;transition:all .3s;
}
#unlock-btn:hover{background:#c9a0a0;color:#0d0810}
#error-msg{color:#a05060;font-size:13px;margin-top:1.25rem;letter-spacing:.1em;opacity:0;transition:opacity .3s;text-align:center;font-family:'Cormorant Garamond',serif}
#error-msg.show{opacity:1}
#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}

/* ── Main App ── */
#app{display:none;opacity:0;transition:opacity 1.2s ease}
#app.visible{display:block}
#app.fade-in{opacity:1}

.scene{
  background:#1a120e;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:40px 16px 60px;position:relative;overflow:hidden;
}
.desk-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 80%,#2a1a0e 0%,#0e0a06 100%)}
.candle-glow{
  position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,140,60,.09) 0%,transparent 70%);
  top:-100px;left:50%;transform:translateX(-50%);pointer-events:none;
  animation:candleFlicker 4s ease-in-out infinite;
}
@keyframes candleFlicker{
  0%,100%{opacity:1;transform:translateX(-50%) scale(1)}
  25%{opacity:.85;transform:translateX(-50%) scale(1.04)}
  50%{opacity:.95;transform:translateX(-50%) scale(.97)}
  75%{opacity:.88;transform:translateX(-50%) scale(1.02)}
}

.book-container{position:relative;z-index:2;width:100%;max-width:620px}

/* ── Search ── */
.search-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.search-row input{
  background:rgba(180,130,70,.1);border:1px solid rgba(180,130,70,.3);
  color:#e8d5b0;font-family:'Cormorant Garamond',serif;font-size:14px;
  padding:7px 14px;border-radius:1px;width:210px;outline:none;letter-spacing:.05em;
}
.search-row input::placeholder{color:#7a6040;font-size:13px}
.search-row input:focus{border-color:rgba(200,160,80,.5)}
.search-row button{
  background:rgba(180,130,70,.15);border:1px solid rgba(180,130,70,.35);
  color:#c8a050;font-family:'Cormorant Garamond',serif;font-size:13px;
  letter-spacing:.12em;padding:7px 16px;border-radius:1px;cursor:pointer;transition:all .25s;
}
.search-row button:hover{background:rgba(180,130,70,.3)}
.search-hint{text-align:center;font-family:'Cormorant Garamond',serif;font-size:12px;color:#7a6040;letter-spacing:.1em;margin-bottom:20px;min-height:18px;transition:color .3s}

/* ── Book Cover ── */
.book{width:100%;position:relative;perspective:1600px}
.book-cover{
  width:100%;min-height:560px;position:relative;
  border-radius:4px 10px 10px 4px;cursor:pointer;
  transform-style:preserve-3d;transform-origin:left center;
  transition:transform .9s cubic-bezier(.4,0,.15,1),box-shadow .5s;
  box-shadow:6px 6px 0 #1a0e06,8px 8px 0 #140c04,12px 12px 20px rgba(0,0,0,.7),-2px 0 8px rgba(0,0,0,.5);
}
.book-cover.open{transform:rotateY(-155deg);box-shadow:2px 4px 16px rgba(0,0,0,.4)}
.cover-front{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(92deg,rgba(0,0,0,.04) 0px,rgba(0,0,0,0) 2px,rgba(255,255,255,.02) 4px,rgba(0,0,0,0) 6px),
    repeating-linear-gradient(180deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,0) 3px,rgba(255,255,255,.015) 6px,rgba(0,0,0,0) 9px),
    linear-gradient(160deg,#6b3a1f 0%,#4a2410 30%,#3d1e0c 55%,#5c3018 80%,#4a2810 100%);
  border-radius:4px 10px 10px 4px;border-left:12px solid #2a1206;
  backface-visibility:hidden;overflow:hidden;
}
.cover-spine-shadow{position:absolute;left:0;top:0;bottom:0;width:18px;background:linear-gradient(to right,rgba(0,0,0,.5),transparent);pointer-events:none}
.cover-border-outer{position:absolute;inset:12px;border:1px solid rgba(200,160,80,.35);border-radius:3px;pointer-events:none}
.cover-border-inner{position:absolute;inset:18px;border:1px solid rgba(200,160,80,.2);border-radius:2px;pointer-events:none}
.cover-corner{position:absolute;width:28px;height:28px;border-color:rgba(200,160,80,.5);border-style:solid}
.cover-corner.tl{top:10px;left:22px;border-width:2px 0 0 2px;border-radius:2px 0 0 0}
.cover-corner.tr{top:10px;right:10px;border-width:2px 2px 0 0;border-radius:0 2px 0 0}
.cover-corner.bl{bottom:10px;left:22px;border-width:0 0 2px 2px;border-radius:0 0 0 2px}
.cover-corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0;border-radius:0 0 2px 0}
.cover-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:40px 28px;
}
.cover-ornament-top{font-size:13px;letter-spacing:.6em;color:rgba(200,160,80,.6);margin-bottom:20px}
.cover-title{font-family:'UnifrakturMaguntia',serif;font-size:58px;color:#c8a050;line-height:1.1;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.4);letter-spacing:.04em}
.cover-name-emboss{font-family:'Dancing Script',cursive;font-size:16px;color:rgba(200,160,80,.5);letter-spacing:.2em;margin-bottom:10px}
.cover-rule{width:100px;height:1px;background:linear-gradient(to right,transparent,rgba(200,160,80,.5),transparent);margin:0 auto 14px}
.cover-subtitle{font-family:'Dancing Script',cursive;font-size:20px;color:rgba(220,185,120,.7);letter-spacing:.06em;margin-bottom:32px}
.cover-open-hint{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:rgba(200,160,80,.4);animation:breathe 2.8s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.35}50%{opacity:.8}}
.cover-clasp{
  position:absolute;right:-8px;top:50%;transform:translateY(-50%);
  width:20px;height:44px;background:linear-gradient(to bottom,#c8a050,#8b6820,#c8a050);
  border-radius:2px;box-shadow:1px 1px 4px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
}
.cover-clasp::after{content:'';width:8px;height:8px;background:#2a1206;border-radius:50%;box-shadow:0 0 0 2px rgba(200,160,80,.6)}
.cover-ribbon{
  position:absolute;top:0;right:60px;width:14px;
  height:80px;
  background:linear-gradient(to bottom,#8b1a1a,#c03030,#8b1a1a);
  border-radius:0 0 3px 3px;
  box-shadow:1px 1px 4px rgba(0,0,0,.4);
}
.cover-ribbon::after{
  content:'';position:absolute;bottom:-10px;left:0;
  border-left:7px solid #c03030;border-right:7px solid #c03030;
  border-top:10px solid #c03030;border-bottom:10px solid transparent;
}
.cover-back{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#4a2410 0%,#3a1c0a 50%,#4a2410 100%);
  border-radius:4px 10px 10px 4px;border-left:12px solid #2a1206;
  backface-visibility:hidden;transform:rotateY(180deg);
}

/* ── Pages ── */
.page-block{display:none;width:100%}
.page-block.visible{display:block}
.page{
  width:100%;
  background:
    repeating-linear-gradient(0deg,rgba(139,100,60,.06) 0px,rgba(139,100,60,0) 1px,rgba(255,255,255,.04) 28px,rgba(0,0,0,0) 29px),
    linear-gradient(170deg,#f2e4c8 0%,#ecdbb0 30%,#e8d4a8 60%,#f0e0be 100%);
  border-radius:2px 8px 8px 2px;border-left:6px solid #6b3a1f;
  padding:48px 52px 68px;min-height:560px;position:relative;
  box-shadow:4px 0 14px rgba(0,0,0,.3),inset 0 0 60px rgba(139,90,40,.08);
  animation:candlePageFlicker 6s ease-in-out infinite;
}
@keyframes candlePageFlicker{
  0%,100%{box-shadow:4px 0 14px rgba(0,0,0,.3),inset 0 0 60px rgba(139,90,40,.08)}
  40%{box-shadow:4px 0 14px rgba(0,0,0,.3),inset 0 0 80px rgba(139,90,40,.13)}
  70%{box-shadow:4px 0 14px rgba(0,0,0,.3),inset 0 0 50px rgba(139,90,40,.06)}
}
.page-aged-edge{position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(to left,rgba(139,90,40,.15),transparent);pointer-events:none;border-radius:0 8px 8px 0}
.page-aged-top{position:absolute;left:0;right:0;top:0;height:16px;background:linear-gradient(to bottom,rgba(139,90,40,.12),transparent);pointer-events:none}
.page-aged-bottom{position:absolute;left:0;right:0;bottom:0;height:20px;background:linear-gradient(to top,rgba(139,90,40,.15),transparent);pointer-events:none;border-radius:0 0 8px 0}
.ribbon-marker{
  position:absolute;top:0;right:52px;width:12px;height:56px;
  background:linear-gradient(to bottom,#8b1a1a,#c03030);
  border-radius:0 0 3px 3px;
}
.ribbon-marker::after{
  content:'';position:absolute;bottom:-8px;left:0;
  border-left:6px solid #c03030;border-right:6px solid #c03030;
  border-top:8px solid #c03030;border-bottom:8px solid transparent;
}
.pg-num-left{position:absolute;bottom:24px;left:52px;font-family:'Cormorant Garamond',serif;font-size:12px;color:#8b6b40;letter-spacing:.2em}
.pg-num-right{position:absolute;bottom:24px;right:52px;font-family:'Cormorant Garamond',serif;font-size:12px;color:#8b6b40;letter-spacing:.2em}

/* ── Page types ── */
.pg-cover-inner{text-align:center;padding-top:40px}
.pg-title-fraktur{font-family:'UnifrakturMaguntia',serif;font-size:46px;color:#3a1e08;margin-bottom:6px;letter-spacing:.03em}
.pg-cover-sub{font-family:'Dancing Script',cursive;font-size:20px;color:#6b3a1f;margin-bottom:8px}
.pg-cover-rule{width:80px;height:1px;background:linear-gradient(to right,transparent,#a07040,transparent);margin:0 auto 20px}
.countdown-box{
  background:rgba(139,90,40,.08);border:1px solid rgba(139,90,40,.2);
  border-radius:2px;padding:14px 20px;margin-bottom:24px;
  font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:#6b4020;
  letter-spacing:.05em;line-height:1.8;
}
.countdown-num{font-family:'Playfair Display',serif;font-size:22px;font-style:normal;color:#5a3010;font-weight:400}
.pg-open-book-btn{background:transparent;border:1px solid #8b5e30;color:#5a3010;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.2em;text-transform:uppercase;padding:10px 28px;cursor:pointer;transition:all .3s;border-radius:1px}
.pg-open-book-btn:hover{background:#8b5e30;color:#f2e4c8}

.pg-section-head{font-family:'UnifrakturMaguntia',serif;font-size:30px;color:#3a1e08;text-align:center;margin-bottom:6px}
.pg-section-rule{width:60px;height:1px;background:linear-gradient(to right,transparent,#a07040,transparent);margin:0 auto 24px}

/* index */
.idx-list{list-style:none}
.idx-list li{display:flex;align-items:baseline;padding:9px 0;border-bottom:1px solid rgba(139,90,40,.18);cursor:pointer;transition:color .2s}
.idx-list li:hover .idx-t{color:#6b3a1f}
.idx-n{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#a07850;min-width:28px}
.idx-t{font-family:'Cormorant Garamond',serif;font-size:15px;color:#2c1408;flex:1;transition:color .2s}
.idx-dots{flex:1;border-bottom:1px dotted rgba(139,90,40,.4);margin:0 10px;position:relative;top:-3px}
.idx-p{font-family:'Cormorant Garamond',serif;font-size:12px;color:#8b6b40;min-width:20px;text-align:right}

/* dedication */
.dedication-wrap{padding:20px 0 0;text-align:center}
.dedication-seal{
  width:64px;height:64px;border-radius:50%;
  background:radial-gradient(circle,#8b1a1a 0%,#5a0f0f 100%);
  border:2px solid rgba(200,100,100,.4);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:24px;
  box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 2px rgba(255,150,150,.2);
}
.dedication-text{
  font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;
  line-height:2;color:#2c1408;
  border-left:2px solid rgba(139,90,40,.3);
  padding-left:20px;text-align:left;margin-top:16px;
}
.dedication-sig{font-family:'Dancing Script',cursive;font-size:22px;color:#6b3a1f;text-align:right;margin-top:16px}

/* timeline */
.timeline-wrap{padding:4px 0 0}
.timeline-item{display:flex;gap:16px;margin-bottom:20px;position:relative;padding-left:28px}
.timeline-item::before{content:'';position:absolute;left:8px;top:6px;width:1px;bottom:-14px;background:rgba(139,90,40,.25)}
.timeline-item:last-child::before{display:none}
.timeline-dot{position:absolute;left:4px;top:5px;width:9px;height:9px;border-radius:50%;background:#a07040;border:1px solid rgba(200,160,80,.5);flex-shrink:0}
.timeline-date{font-family:'Cormorant Garamond',serif;font-size:11px;color:#a07850;letter-spacing:.15em;min-width:70px;margin-top:2px;font-style:italic}
.timeline-content{}
.timeline-title{font-family:'Dancing Script',cursive;font-size:18px;color:#3a1e08;margin-bottom:2px}
.timeline-body{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:#5a3820;line-height:1.7}

/* letter */
.letter-wrap{padding:8px 4px}
.letter-date{font-family:'Cormorant Garamond',serif;font-size:12px;color:#8b6b40;text-align:right;letter-spacing:.1em;margin-bottom:16px;font-style:italic}
.letter-salutation{font-family:'Dancing Script',cursive;font-size:22px;color:#3a1e08;margin-bottom:14px}
.letter-body{font-family:'Cormorant Garamond',serif;font-size:15.5px;font-style:italic;line-height:2;color:#2c1408;white-space:pre-line}
.letter-close{font-family:'Dancing Script',cursive;font-size:20px;color:#3a1e08;margin-top:20px}
.letter-sig{font-family:'Dancing Script',cursive;font-size:26px;color:#6b3a1f;margin-top:6px}
.wax-seal{
  width:52px;height:52px;border-radius:50%;
  background:radial-gradient(circle,#8b1a1a 0%,#5a0f0f 100%);
  border:2px solid rgba(200,100,100,.35);
  display:flex;align-items:center;justify-content:center;
  margin-top:20px;font-size:18px;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
}

/* poem */
.poem-roman{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:#a07850;margin-bottom:16px}
.poem-title-pg{font-family:'Dancing Script',cursive;font-size:26px;color:#3a1e08;margin-bottom:18px;font-weight:400}
.poem-body-pg{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:2.1;color:#2c1408}
.typewriter-line{opacity:0;animation:fadeInLine .3s ease forwards}
@keyframes fadeInLine{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.poem-orn{margin-top:18px;text-align:center;color:#a07850;font-size:15px;letter-spacing:.6em}

/* epilogue */
.epilogue-body{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:2.1;color:#2c1408;text-align:center;margin-top:12px}

/* secret */
.secret-wrap{text-align:center;padding:30px 0}
.secret-symbol{font-size:42px;color:#8b1a1a;margin-bottom:20px;animation:pulse 3s ease-in-out infinite}
.secret-title{font-family:'UnifrakturMaguntia',serif;font-size:28px;color:#3a1e08;margin-bottom:16px}
.secret-body{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:2;color:#2c1408}
.secret-input-row{display:flex;gap:8px;justify-content:center;margin-top:20px}
.secret-input-row input{background:rgba(139,90,40,.08);border:1px solid rgba(139,90,40,.3);color:#3a1e08;font-family:'Cormorant Garamond',serif;font-size:14px;padding:7px 14px;border-radius:1px;width:180px;outline:none;text-align:center;letter-spacing:.2em}
.secret-input-row input::placeholder{color:#a07850;font-size:12px}
.secret-input-row button{background:transparent;border:1px solid #8b5e30;color:#5a3010;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;padding:7px 16px;cursor:pointer;transition:all .3s;border-radius:1px}
.secret-input-row button:hover{background:#8b5e30;color:#f2e4c8}
.secret-msg{font-family:'Cormorant Garamond',serif;font-size:13px;color:#8b3030;text-align:center;margin-top:10px;min-height:18px;font-style:italic}
.secret-revealed{display:none}
.secret-revealed.show{display:block}
.secret-love-text{font-family:'Dancing Script',cursive;font-size:26px;color:#3a1e08;margin-bottom:14px}
.secret-love-body{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;line-height:2;color:#2c1408}

/* nav */
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-top:18px;gap:8px;flex-wrap:wrap}
.nav-btn{background:rgba(200,160,80,.08);border:1px solid rgba(200,160,80,.25);color:#c8a050;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:7px 14px;border-radius:1px;cursor:pointer;transition:all .25s;white-space:nowrap}
.nav-btn:hover{background:rgba(200,160,80,.2);color:#e8d080}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-btn.primary{background:rgba(107,58,31,.3);border-color:rgba(139,90,40,.5);color:#e8c880}
.nav-btn.primary:hover{background:rgba(107,58,31,.5)}
.jump-wrap{display:flex;align-items:center;gap:6px}
.jump-wrap input{width:50px;background:rgba(200,160,80,.08);border:1px solid rgba(200,160,80,.22);color:#e8d080;font-family:'Cormorant Garamond',serif;font-size:13px;padding:6px 8px;border-radius:1px;text-align:center;outline:none}
.jump-wrap input:focus{border-color:rgba(200,160,80,.5)}

@media(max-width:520px){.page{padding:36px 28px 60px}.cover-title{font-size:44px}.nav-bar{justify-content:center}}

/* ── Cat ── */
#kitty{
  position:absolute;
  bottom:36px;
  left:60px;
  pointer-events:auto;
  z-index:20;
  cursor:pointer;
}
#kitty svg{display:block}
.kitty-bubble{
  position:absolute;
  bottom:58px;
  left:50%;
  transform:translateX(-50%);
  background:#f5efe6;
  border:1px solid rgba(139,90,40,.35);
  border-radius:8px;
  padding:5px 12px;
  font-family:'Dancing Script',cursive;
  font-size:14px;
  color:#5a3010;
  white-space:nowrap;
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
  box-shadow:0 2px 6px rgba(0,0,0,.12);
}
.kitty-bubble::after{
  content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:7px solid #f5efe6;
}
.kitty-bubble.show{opacity:1}
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- No external audio needed — generated by Web Audio API -->

<!-- Lock Screen -->
<div id="lock-screen">
  <div class="lock-rose">🌹</div>
  <div class="lock-title">For Aurora, with love</div>
  <div class="lock-subtitle">A secret garden awaits</div>

<script>
// ── Page definitions ──
const PAGES = [
  { type: 'title' },
  { type: 'dedication' },
  { type: 'index' },
  { type: 'poem', title: 'The Way You Look at Me', body: `There's a moment just before you smile,
when your eyes soften at the corners —
a tiny universe deciding
whether to let me in.

It always does.

And I fall, quietly,
the way a leaf falls in October —
not rushing, not afraid,
just turning gold
in the light of you.` },
  { type: 'poem', title: 'Morning', body: `I have a theory
that mornings were invented
just so I could watch you
reach for your coffee,

still half-dreaming,
your hair forgetting what shape it is —
the most honest version of you,
and the one I love the most.` },
  { type: 'poem', title: 'Distance', body: `The miles between us
are just numbers.
What matters is this:

that somewhere across the sky
you are laughing at something,
living in your wonderful way,

and when I think of you
every corner of me
becomes a little warmer.` },
  { type: 'poem', title: 'Small Things', body: `I love you in the small things:
the way you remember details,
the sound of you humming without knowing it,
how you hold a thought
before you say it —
careful, like it matters.

It does.
You do.

More than all the grand gestures
I never quite know how to make.` },
  { type: 'poem', title: 'Aurora', body: `You were named for the light
that breaks at the edge of night —
the sky's way of saying:
something beautiful is coming.

It was right.

Every room you enter
rearranges itself around you,
and I have been the lucky one
standing closest to the glow.` },
  { type: 'epilogue' },
  { type: 'secret' }
];

let cur = 0, animating = false, bookOpen = false;
let secretUnlocked = false;
let countdownTickInterval = null;

function startCountdownTick() {
  clearInterval(countdownTickInterval);
  countdownTickInterval = setInterval(() => {
    const cd = getCountdown();
    const d = document.getElementById('cdDays');
    const h = document.getElementById('cdHours');
    const m = document.getElementById('cdMins');
    const s = document.getElementById('cdSecs');
    if (!s) { clearInterval(countdownTickInterval); return; }
    if (cd.passed) {
      clearInterval(countdownTickInterval);
      const box = document.getElementById('countdownBox');
      if (box) box.innerHTML = `<span style="font-family:'Dancing Script',cursive;font-size:20px;color:#5a3010">The wait is over ♥</span><br><span style="font-size:13px;opacity:.8">24th April 2026 — finally together</span>`;
      return;
    }
    if (d) d.textContent = cd.days;
    if (h) h.textContent = cd.hours;
    if (m) m.textContent = cd.minutes;
    if (s) s.textContent = cd.seconds;
  }, 1000);
}

// ── Countdown to April 24 2026 10PM Berlin ──
function getCountdown() {
  const target = new Date('2026-04-24T22:00:00+02:00');
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, passed: true };
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  return { days, hours, minutes, seconds, passed: false };
}

// ── Stars ──
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function createStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.3 + 0.2, alpha: Math.random() * .5 + .1, speed: Math.random() * .003 + .001, phase: Math.random() * Math.PI * 2 });
  }
}
function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const a = s.alpha * (.6 + .4 * Math.sin(t * s.speed * 1000 + s.phase));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240,221,208,${a})`; ctx.fill();
  });
  requestAnimationFrame(t => drawStars(t / 1000));
}
resizeCanvas(); createStars();
requestAnimationFrame(t => drawStars(t / 1000));
window.addEventListener('resize', () => { resizeCanvas(); createStars(); });

// ── Cat "I love you Auri" sound ──
function playMeowSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const t = ac.currentTime;
    // sweet ascending chirp
    [[520,0],[620,0.12],[580,0.22],[680,0.34],[640,0.44]].forEach(([freq, when]) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(freq, t + when);
      o.frequency.exponentialRampToValueAtTime(freq * 1.3, t + when + 0.1);
      g.gain.setValueAtTime(0, t + when);
      g.gain.linearRampToValueAtTime(0.18, t + when + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + when + 0.18);
      o.connect(g); g.connect(ac.destination);
      o.start(t + when); o.stop(t + when + 0.2);
    });
  } catch(e) {}
}

// ── Cat Animation (lives inside the page) ──
(function initCat() {
  const kitty = document.getElementById('kitty');
  if (!kitty) { setTimeout(initCat, 300); return; }
  const bubble = document.getElementById('kittyBubble');
  const tail   = document.getElementById('catTail');
  const leg1   = document.getElementById('leg1');
  const leg2   = document.getElementById('leg2');
  const leg3   = document.getElementById('leg3');
  const legsWalk = document.getElementById('legsWalk');
  const legsSit  = document.getElementById('legsSit');

  let catX = 60, catDir = 1, catState = 'walk';
  let stateTimer = 2000, bubbleTimer = 0, flipped = false;
  const idleSayings = ['purrrr ♥','mrow~','*yawns*','zzz...','*blinks*','meow!'];

  function getMaxX() {
    const page = document.getElementById('currentPage');
    return page ? Math.max(page.offsetWidth - 80, 160) : 460;
  }

  function showBubble(text, dur) {
    bubble.textContent = text;
    bubble.classList.add('show');
    clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), dur || 2200);
  }

  function animateTail(t) {
    const sw = Math.sin(t * 0.003) * 10;
    tail.setAttribute('d', `M42,40 Q${50+sw},${36+sw*0.4} 50,26`);
  }

  function animateLegs(t) {
    if (catState !== 'walk') {
      legsWalk.style.display = 'none'; legsSit.style.display = 'block'; return;
    }
    legsWalk.style.display = 'block'; legsSit.style.display = 'none';
    const s = Math.sin(t * 0.012);
    leg1.setAttribute('y', 44 + (s > 0 ? -3 : 0));
    leg2.setAttribute('y', 44 + (s < 0 ? -3 : 0));
    leg3.setAttribute('y', 44 + (s > 0 ? -3 : 0));
  }

  let lastT = 0;
  function loop(t) {
    const dt = Math.min(t - lastT, 50); lastT = t;
    stateTimer -= dt;
    animateTail(t); animateLegs(t);
    const maxX = getMaxX();
    if (catState === 'walk') {
      catX += catDir * 0.65;
      if (catX >= maxX) { catDir = -1; flipped = true; catX = maxX; }
      if (catX <= 16)   { catDir =  1; flipped = false; catX = 16; }
      if (stateTimer <= 0) {
        if (Math.random() < 0.35) {
          catState = 'sit'; stateTimer = 2500 + Math.random() * 3000;
          showBubble(idleSayings[Math.floor(Math.random() * idleSayings.length)]);
        } else { stateTimer = 1800 + Math.random() * 2000; }
      }
    } else {
      if (stateTimer <= 0) { catState = 'walk'; stateTimer = 2000 + Math.random() * 2000; }
    }
    kitty.style.left = catX + 'px';
    kitty.style.transform = flipped ? 'scaleX(-1)' : 'scaleX(1)';
    requestAnimationFrame(loop);
  }

  kitty.addEventListener('click', e => {
    e.stopPropagation();
    playMeowSound();
    showBubble('I love you Auri ♥', 3200);
    catState = 'sit'; stateTimer = 3500;
  });

  requestAnimationFrame(loop);
})();

// ── Lock ──
function tryUnlock() {
  const val = document.getElementById('password-input').value.trim().toLowerCase().replace(/\s/g, '');
  if (val === 'kittycat') {
    const ls = document.getElementById('lock-screen');
    ls.classList.add('fade-out');
    setTimeout(() => {
      ls.style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => app.classList.add('visible', 'fade-in')));
    }, 800);
  } else {
    const err = document.getElementById('error-msg');
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 2500);
    document.getElementById('password-input').value = '';
  }
}
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// ── Helpers ──
function toRoman(n) {
  const v = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const s = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let r = ''; for (let i = 0; i < v.length; i++) { while (n >= v[i]) { r += s[i]; n -= v[i]; } } return r;
}

// ── Open Book ──
function openBook() {
  if (bookOpen) return; bookOpen = true;
  document.getElementById('bookCover').classList.add('open');
  setTimeout(() => {
    document.getElementById('bookCover').style.display = 'none';
    document.getElementById('pageBlock').classList.add('visible');
    renderPage(0, document.getElementById('currentPage'));
    renderNav();
  }, 850);
}

// ── Render Pages ──
function renderPage(idx, el) {
  const p = PAGES[idx];
  // preserve the kitty div before wiping innerHTML
  const kittyEl = document.getElementById('kitty');
  el.innerHTML = '<div class="page-aged-edge"></div><div class="page-aged-top"></div><div class="page-aged-bottom"></div><div class="ribbon-marker"></div>';
  if (kittyEl) el.appendChild(kittyEl);

  if (p.type === 'title') {
    const cd = getCountdown();
    const countdownHTML = cd.passed
      ? `<div class="countdown-box">
           <span style="font-family:'Dancing Script',cursive;font-size:20px;color:#5a3010">The wait is over ♥</span><br>
           <span style="font-size:13px;opacity:.8">24th April 2026 — finally together</span>
         </div>`
      : `<div class="countdown-box" id="countdownBox">
           See you in<br>
           <span class="countdown-num" id="cdDays">${cd.days}</span> <span style="font-size:13px">days</span>
           &nbsp;·&nbsp;
           <span class="countdown-num" id="cdHours">${cd.hours}</span> <span style="font-size:13px">hrs</span>
           &nbsp;·&nbsp;
           <span class="countdown-num" id="cdMins">${cd.minutes}</span> <span style="font-size:13px">min</span>
           &nbsp;·&nbsp;
           <span class="countdown-num" id="cdSecs">${cd.seconds}</span> <span style="font-size:13px">sec</span><br>
           <span style="font-size:12px;opacity:.7">24th April 2026 · 10 PM · Berlin</span>
         </div>`;
    el.innerHTML += `<div class="pg-cover-inner">
      <div class="pg-title-fraktur">Eternore</div>
      <div class="pg-cover-sub">With Love For Aurora</div>
      <div class="pg-cover-rule"></div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:#8b6b40;letter-spacing:.08em;margin-bottom:20px">A Book of Poems</div>
      ${countdownHTML}
      <button class="pg-open-book-btn" onclick="goTo(1)">Begin reading ›</button>
    </div>`;
    const pnl = document.createElement('div'); pnl.className = 'pg-num-left'; pnl.textContent = 'Eternore'; el.appendChild(pnl);
    if (!cd.passed) startCountdownTick();
    return;
  }

  if (p.type === 'dedication') {
    el.innerHTML += `<div class="dedication-wrap">
      <div class="pg-section-head" style="font-size:24px">Dedication</div>
      <div class="pg-section-rule"></div>
      <div class="dedication-seal">✦</div>
      <div class="dedication-text">To Aurora —<br><br>
You are the poem I could never write well enough.<br>
Every page of this book is just my way of trying.<br><br>
You came into my life and rearranged everything quietly,<br>
like sunlight moving through a room.<br>
I did not notice at first.<br>
Then I noticed nothing else.<br><br>
This book belongs to you. You always did.</div>
      <div class="dedication-sig">— yours, always</div>
    </div>`;
    const pnl = document.createElement('div'); pnl.className = 'pg-num-left'; pnl.textContent = 'Eternore'; el.appendChild(pnl); return;
  }

  if (p.type === 'index') {
    let rows = '';
    const labels = {title:'Title Page', dedication:'Dedication', index:'Index', poem:'', timeline:'Our Story', letter:'A Letter', epilogue:'Epilogue', secret:'Hidden Page'};
    PAGES.forEach((pg, i) => {
      if (i < 3) return;
      const label = pg.type === 'poem' ? pg.title : (labels[pg.type] || pg.type);
      const pgNum = i - 2;
      const isSecret = pg.type === 'secret';
      rows += `<li onclick="goTo(${i})">
        <span class="idx-n">${isSecret ? '✦' : (pg.type === 'poem' ? toRoman(i - 3) : '—')}</span>
        <span class="idx-t">${label}${isSecret ? ' <span style="font-size:10px;color:#a07850">(secret)</span>' : ''}</span>
        <span class="idx-dots"></span>
        <span class="idx-p">${pgNum}</span>
      </li>`;
    });
    el.innerHTML += `<div class="pg-section-head">Index</div><div class="pg-section-rule"></div><ul class="idx-list">${rows}</ul>`;
    const pnl = document.createElement('div'); pnl.className = 'pg-num-left'; pnl.textContent = 'Eternore'; el.appendChild(pnl); return;
  }

  if (p.type === 'poem') {
    const num = PAGES.slice(0, idx).filter(x => x.type === 'poem').length + 1;
    const lines = p.body.split('\n');
    let linesHTML = '';
    lines.forEach((line, i) => {
      linesHTML += `<div class="typewriter-line" style="animation-delay:${i * 80}ms">${line || '&nbsp;'}</div>`;
    });
    el.innerHTML += `<div class="poem-roman">${toRoman(num)}</div>
      <div class="poem-title-pg">${p.title}</div>
      <div class="poem-body-pg">${linesHTML}</div>
      <div class="poem-orn">· · ·</div>
      <div style="font-family:'Dancing Script',cursive;font-size:19px;color:#8b5e30;text-align:right;margin-top:16px;padding-right:8px">— Pranav Arya</div>`;
    const pnl = document.createElement('div'); pnl.className = 'pg-num-left'; pnl.textContent = 'Eternore';
    const pnr = document.createElement('div'); pnr.className = 'pg-num-right'; pnr.textContent = `— ${num} —`;
    el.appendChild(pnl); el.appendChild(pnr); return;
  }

  if (p.type === 'epilogue') {
    el.innerHTML += `<div style="padding-top:48px">
      <div class="pg-section-head">Epilogue</div>
      <div class="pg-section-rule"></div>
      <div class="epilogue-body">This book has no last page,<br>only the next chapter<br>we haven't written yet.<br><br>Every day with you<br>is a sentence worth keeping.<br><br>Sempre, Aurora.</div>
      <div class="poem-orn" style="margin-top:28px">✦</div>
    </div>`;
    const pnl = document.createElement('div'); pnl.className = 'pg-num-left'; pnl.textContent = 'Eternore';
    const pnr = document.createElement('div'); pnr.className = 'pg-num-right'; pnr.textContent = '— fin —';
    el.appendChild(pnl); el.appendChild(pnr); return;
  }

  if (p.type === 'secret') {
    if (secretUnlocked) {
      el.innerHTML += `<div class="secret-wrap">
        <div class="dedication-seal">♥</div>
        <div class="secret-title">Only For You</div>
        <div class="secret-love-body" style="font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;line-height:2.1;color:#2c1408;text-align:center;margin-top:12px">
          If you are reading this, it means you found the hidden page.<br><br>
          Which means you were curious enough to look.<br>
          Which means you are exactly who I knew you were.<br><br>
          I hid this here to tell you one last thing —<br>
          the thing I mean most, the thing I say least:<br><br>
          <span style="font-family:'Dancing Script',cursive;font-size:24px;color:#5a3010">You are my favourite person in the world.</span><br><br>
          Not just today. Not just in this book.<br>
          Always. Without question.<br>
          In every version of every story I could ever live.
        </div>
        <div class="poem-orn" style="margin-top:24px">♥ ♥ ♥</div>
      </div>`;
    } else {
      el.innerHTML += `<div class="secret-wrap">
        <div class="secret-symbol">🔒</div>
        <div class="secret-title">A Hidden Page</div>
        <div class="secret-body">This page holds one last secret.<br>If you know the word, speak it.</div>
        <div class="secret-input-row">
          <input type="password" id="secretInput" placeholder="the secret word..." />
          <button onclick="trySecretUnlock()">Open</button>
        </div>
        <div class="secret-msg" id="secretMsg"></div>
      </div>`;
      document.getElementById('secretInput') && document.getElementById('secretInput').addEventListener('keydown', e => { if (e.key === 'Enter') trySecretUnlock(); });
    }
    const pnl = document.createElement('div'); pnl.className = 'pg-num-left'; pnl.textContent = 'Eternore';
    const pnr = document.createElement('div'); pnr.className = 'pg-num-right'; pnr.textContent = '— ✦ —';
    el.appendChild(pnl); el.appendChild(pnr); return;
  }
}

function trySecretUnlock() {
  const inp = document.getElementById('secretInput');
  if (!inp) return;
  const val = inp.value.trim().toLowerCase();
  if (val === 'aurora') {
    secretUnlocked = true;
    renderPage(PAGES.length - 1, document.getElementById('currentPage'));
  } else {
    const msg = document.getElementById('secretMsg');
    if (msg) { msg.textContent = 'That is not quite the word…'; setTimeout(() => { msg.textContent = ''; }, 2000); }
    inp.value = '';
  }
}

// ── Nav ──
function renderNav() {
  const nb = document.getElementById('navBar'); nb.innerHTML = '';
  if (!bookOpen) return;

  // Close book button — always shown
  const close = document.createElement('button');
  close.className = 'nav-btn';
  close.textContent = '✕ Close';
  close.onclick = () => closeBook();
  nb.appendChild(close);

  const back = document.createElement('button');
  back.className = 'nav-btn'; back.textContent = '‹ Back';
  back.disabled = cur <= 0;
  back.onclick = () => { if (cur > 0) goTo(cur - 1); else closeBook(); };
  nb.appendChild(back);

  const idx = document.createElement('button');
  idx.className = 'nav-btn'; idx.textContent = 'Index';
  idx.disabled = cur === 2; idx.onclick = () => goTo(2);
  nb.appendChild(idx);

  const jw = document.createElement('div'); jw.className = 'jump-wrap';
  const ji = document.createElement('input');
  ji.type = 'number'; ji.min = '1'; ji.max = PAGES.length - 3;
  ji.placeholder = 'pg'; ji.id = 'jumpInput';
  const jb = document.createElement('button'); jb.className = 'nav-btn'; jb.textContent = 'Go';
  jb.onclick = () => { const v = parseInt(document.getElementById('jumpInput').value); if (v >= 1 && v <= PAGES.length - 3) goTo(v + 2); };
  ji.addEventListener('keydown', e => { if (e.key === 'Enter') jb.click(); });
  jw.appendChild(ji); jw.appendChild(jb); nb.appendChild(jw);

  const next = document.createElement('button');
  next.className = 'nav-btn primary'; next.textContent = 'Next ›';
  next.disabled = cur >= PAGES.length - 1; next.onclick = () => goTo(cur + 1);
  nb.appendChild(next);
}

// ── Close Book ──
function closeBook() {
  if (animating) return;
  bookOpen = false;
  const pb = document.getElementById('pageBlock');
  pb.classList.remove('visible');
  const cover = document.getElementById('bookCover');
  cover.style.display = '';
  cover.classList.remove('open');
  cur = 0;
  document.getElementById('navBar').innerHTML = '';
}

// ── Go To ──
function goTo(idx) {
  if (animating || idx === cur || idx < 0 || idx >= PAGES.length) return;
  animating = true;
  const el = document.getElementById('currentPage');
  const dir = idx > cur ? 1 : -1;
  el.style.transition = 'opacity .25s, transform .3s';
  el.style.opacity = '0';
  el.style.transform = dir > 0 ? 'rotateY(-15deg) translateX(-12px)' : 'rotateY(15deg) translateX(12px)';
  setTimeout(() => {
    cur = idx; renderPage(cur, el); renderNav();
    el.style.transition = 'none'; el.style.opacity = '0';
    el.style.transform = dir > 0 ? 'rotateY(12deg) translateX(12px)' : 'rotateY(-12deg) translateX(-12px)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transition = 'opacity .35s, transform .45s cubic-bezier(.2,0,.3,1)';
      el.style.opacity = '1'; el.style.transform = 'rotateY(0deg) translateX(0)';
      setTimeout(() => { el.style.transition = ''; animating = false; }, 460);
    }));
  }, 300);
}

// ── Search ──
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const hint = document.getElementById('searchHint');
  if (!q) { hint.textContent = 'Type a poem title or keyword to jump to a page'; hint.style.color = '#7a6040'; return; }
  let best = -1;
  for (let i = 0; i < PAGES.length; i++) {
    const pg = PAGES[i];
    const hay = ((pg.title || '') + ' ' + (pg.body || '') + ' ' + (pg.type || '')).toLowerCase();
    if (hay.includes(q)) { best = i; break; }
  }
  if (best > -1) {
    hint.style.color = '#c8a050';
    hint.textContent = `Found — turning pages…`;
    if (!bookOpen) { openBook(); setTimeout(() => goTo(best), 1000); }
    else setTimeout(() => goTo(best), 300);
  } else {
    hint.style.color = '#a05030';
    hint.textContent = 'No match found — try another word';
  }
}
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
